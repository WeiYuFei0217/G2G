# NCLT-Rig-Cross.yaml -- G2G config
# Task: Multi-camera rig odometry (Task 2)
# Dataset: NCLT cross-date 5-camera rig
# Replace all /path/to/... with your real paths (backbone and data) before use.
# Train: torchrun --nproc_per_node=4 scripts/train_rig.py --config configs/rig/nclt_cross.yaml
# Eval:  python scripts/eval_rig.py --config configs/rig/nclt_cross.yaml --checkpoint /path/to/NCLT-Rig-Cross.pth --output-dir outputs/eval_NCLT-Rig-Cross

# ===== Backbone =====
backbone:
  model_path: "/path/to/map-anything-model/"
  freeze: true

# ===== G2G model =====
model:
  embed_dim: 768
  num_latents: 64
  num_frames_per_group: 5
  resampler_layers: 2
  bridge_alternating_pairs: 0   # merge_only
  bridge_merged_layers: 2
  reinject_anchor_after_merge: true
  pose_head_hidden_dim: 512
  pose_head_layers: 3
  num_heads: 8
  rotation_repr: "6d"

# ===== Data =====
data:
  train:
    step1_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step1_rig_trajectories_train"
    step2_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step2_rig5_configs_train"
    step3_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step3_images_depth_train"
    step6_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step6_rig5_features_train"
    index_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step7_rig5_cross_index_train"
  val:
    step1_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step1_rig_trajectories_val"
    step2_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step2_rig5_configs_val"
    step3_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step3_images_depth_val"
    step6_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step6_rig5_features_val"
    index_root: "/path/to/data/NCLT/NCLT_DATA_GEN/step7_rig5_cross_index_val"
  num_cameras: 5
  total_cameras: 5
  image_size: 224
  patch_size: 14
  num_workers: 4

# ===== Training =====
training:
  batch_size: 32
  gradient_accumulation: 1
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 3
  warmup_steps: 500
  lr_step_interval: 10
  grad_clip: 5.0
  seed: 42
  loss_type: "chordal_frob"
  rotation_weight: 5.0
  translation_weight: 1.0
  intra_pose_weight: 0.5
  inter_pose_weight: 1.0
  log_every: 10
  val_every: 1
  save_every: 1
  max_val_batches: 500
  val_steps_interval: 10000
  output_dir: "./outputs/NCLT-Rig-Cross"

# ===== Overfit mode (--overfit) =====
overfit:
  max_scenes: 1
  batch_size: 8
  epochs: 20
  lr: 1.0e-4
  log_every: 5
