# TartanGround-Reloc.yaml -- G2G config
# Task: Cross-sequence localization (Task 1)
# Dataset: TartanGround
# Replace all /path/to/... with your real paths (backbone and data) before use.
# Train: torchrun --nproc_per_node=4 scripts/train_reloc.py --config configs/reloc/tartanground.yaml --curriculum
# Eval:  python scripts/eval_reloc.py --config configs/reloc/tartanground.yaml --checkpoint /path/to/TartanGround-Reloc.pth --output-dir outputs/eval_TartanGround-Reloc

# ===== Backbone =====
backbone:
  model_path: "/path/to/map-anything-model/"
  freeze: true

# ===== G2G model =====
model:
  embed_dim: 768
  num_latents: 64
  num_frames_per_group: 5
  resampler_layers: 2
  # G2GBridgeMultiFrame parameters
  bridge_alternating_pairs: 0   # skip Phase 1, pure Phase 2 merge
  bridge_merged_layers: 2
  reinject_anchor_after_merge: true
  # MultiFramePoseHead parameters
  pose_head_hidden_dim: 512
  pose_head_layers: 3
  num_heads: 8
  rotation_repr: "6d"

# ===== Data =====
data:
  train:
    step1_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step2_5_augmented_train"
    step2_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step2_5_augmented_train"
    step3_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step3_images_depth_train"
    stage2_index_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step5_stage2_index_train_gt_top200"
    step6_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step6_dinov2_features_224_train"
  val:
    step1_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step2_5_augmented_val"
    step2_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step2_5_augmented_val"
    step3_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step3_images_depth_val"
    stage2_index_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step5_stage2_index_val_gt_top200_sub1k"
    step6_root: "/path/to/data/TartanGround/TARTANGROUND_DATA_GEN/step6_dinov2_features_224_val"
  img_size: [224, 224]
  window_size: 5
  top_k: 200
  min_overlap_score: 0.1
  num_workers: 2
  anchor_frame_idx: 0
  shuffle_within_group: false
  # Extrinsics noise augmentation
  extrinsics_noise:
    enabled: true
    noise_group_a: true
    noise_group_b: true
    rotation_noise_std_deg: 1.5
    translation_noise_std_m: 0.1

# ===== Training =====
training:
  batch_size: 16
  gradient_accumulation: 1
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 2
  warmup_steps: 1000
  lr_step_interval: 10
  grad_clip: 5.0
  seed: 42

  # Loss
  loss_type: "chordal"
  rotation_weight: 5.0
  translation_weight: 1.0
  # Multi-frame pose loss weights
  intra_pose_weight: 0.5    # A1-A4 (intra-group)
  inter_pose_weight: 1.0    # B0-B4 (inter-group, main task)

  # Adaptive curriculum learning
  curriculum:
    thresholds: [0.5, 0.45, 0.40, 0.35, 0.30, 0.25, 0.20, 0.15, 0.1]
    phase2_end: 0.15
    # Balanced sampling: balance across overlap bins so low-overlap samples do not dominate
    balanced_sampling:
      enabled: true
      bin_width: 0.05
      ref_bin_lo: 0.45
      ref_bin_hi: 0.50
      hard_boost: 1.00
      scene_balanced: true
    convergence:
      window_size: 200
      rot_thresh: 0.1
      trans_thresh: 0.5

  # Logging and checkpointing
  log_every: 10
  val_every: 1
  save_every: 1
  val_steps_interval: 60000
  output_dir: "./outputs/TartanGround-Reloc"

# ===== Overfit mode (--overfit) =====
overfit:
  max_scenes: 3
  batch_size: 16
  epochs: 20
  lr: 1.0e-4
  log_every: 5
  val_every: 1
