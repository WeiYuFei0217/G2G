# ZJH-Reloc.yaml -- G2G config
# Task: Cross-sequence localization (Task 1)
# Dataset: ZJH (sim train, sim+real zero-shot)
# Replace all /path/to/... with your real paths (backbone and data) before use.
# Train: torchrun --nproc_per_node=4 scripts/train_reloc.py --config configs/reloc/zjh.yaml --curriculum
# Eval:  python scripts/eval_reloc.py --config configs/reloc/zjh.yaml --checkpoint /path/to/ZJH-Reloc.pth --output-dir outputs/eval_ZJH-Reloc

# ===== Backbone =====
backbone:
  model_path: "/path/to/map-anything-model/"
  freeze: true

# ===== G2G model =====
model:
  embed_dim: 768
  num_latents: 64
  num_frames_per_group: 5
  resampler_layers: 2
  bridge_alternating_pairs: 0
  bridge_merged_layers: 2
  reinject_anchor_after_merge: true
  pose_head_hidden_dim: 512
  pose_head_layers: 3
  num_heads: 8
  rotation_repr: "6d"

# ===== Data =====
data:
  train:
    step1_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_train/step1"
    step2_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_train/step2"
    step3_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_train/step2"
    stage2_index_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_train/stage2_index"
    step6_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_train/step6"
  val:
    step1_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_val/step1"
    step2_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_val/step2"
    step3_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_val/step2"
    stage2_index_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_val/stage2_index"
    step6_root: "/path/to/data/ZJH/ZJH_DATA_new/training_adapter_val/step6"
  val_real:
    step1_root: "/path/to/data/ZJH/ZJH_DATA/REAL_training_adapter_fix_scale/step1"
    step2_root: "/path/to/data/ZJH/ZJH_DATA/REAL_training_adapter_fix_scale/step2"
    step3_root: "/path/to/data/ZJH/ZJH_DATA/REAL_training_adapter_fix_scale/step2"
    stage2_index_root: "/path/to/data/ZJH/ZJH_DATA/REAL_training_adapter_fix_scale/stage2_index"
    step6_root: "/path/to/data/ZJH/ZJH_DATA/REAL_training_adapter_fix_scale/step6"
    max_samples_per_scene: 5000
  img_size: [224, 224]
  window_size: 5
  top_k: 1000
  min_overlap_score: 0.1
  val_max_samples_per_scene: 1000
  num_workers: 2
  anchor_frame_idx: 0
  shuffle_within_group: false
  extrinsics_noise:
    enabled: true
    noise_group_a: true
    noise_group_b: true
    rotation_noise_std_deg: 1.5
    translation_noise_std_m: 0.1

# ===== Training =====
training:
  batch_size: 32
  gradient_accumulation: 1
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 2
  warmup_steps: 1000
  lr_step_interval: 10
  grad_clip: 5.0
  seed: 42
  loss_type: "chordal"
  rotation_weight: 5.0
  translation_weight: 1.0
  intra_pose_weight: 0.5
  inter_pose_weight: 1.0
  curriculum:
    thresholds: [0.5, 0.45, 0.40, 0.35, 0.30, 0.25, 0.20, 0.15, 0.1]
    phase2_end: 0.15
    convergence:
      window_size: 200
      rot_thresh: 0.1
      trans_thresh: 0.5
  log_every: 1000
  val_every: 1
  save_every: 1
  val_steps_interval: 6000
  output_dir: "./outputs/ZJH-Reloc"

# ===== Overfit mode (--overfit) =====
overfit:
  max_scenes: 3
  batch_size: 32
  epochs: 20
  lr: 1.0e-4
  log_every: 5
  val_every: 1
