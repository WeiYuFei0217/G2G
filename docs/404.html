<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 · G2G</title>
  <meta name="robots" content="noindex">
  <!-- 自包含的 404 页:GitHub Pages 会在任意未匹配路径下提供它,故样式全部内联,
       不依赖 static/ 是否可达;返回首页用站点绝对地址。 -->
  <style>
    :root{
      --bg:#f7f8fb; --card:#ffffff; --border:#e6e8ef;
      --ink:#171a21; --muted:#6b7280; --accent:#4f46e5; --accent-ink:#3b39a8;
      --radius:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--ink);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .card{
      max-width:520px; width:100%; text-align:center;
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); padding:48px 40px;
      box-shadow:0 10px 30px rgba(20,26,40,.06);
    }
    .code{
      font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:64px; font-weight:800; letter-spacing:-2px;
      background:linear-gradient(135deg,var(--accent),#6366f1);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
      line-height:1; margin:0 0 12px;
    }
    h1{font-size:20px; font-weight:700; margin:0 0 8px}
    p{color:var(--muted); font-size:15px; line-height:1.6; margin:0 0 28px}
    a.home{
      display:inline-block; text-decoration:none; font-weight:600; font-size:15px;
      color:#fff; background:var(--accent); padding:12px 24px; border-radius:10px;
      transition:background .15s ease;
    }
    a.home:hover{background:var(--accent-ink)}
  </style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you’re looking for doesn’t exist or has moved.</p>
    <a class="home" href="https://weiyufei0217.github.io/G2G/">← Back to G2G</a>
  </main>
</body>
</html>
